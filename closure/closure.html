<body>

    <p>Contagem com variavel</p>

    <p id="demo"></p>
    <button type="button" onclick="minhaFunc()">conte!</button>
    <script>
        function meuContador(){
            let contador =0;
            return () => {
            contador++;
            return contador;
            }
        }

        const adicionar = meuContador();

        function minhaFunc(){
            docemente.GetElementById("demo").innerHTML = adicionar();
        }
    </script>

    
</body>
</html>
