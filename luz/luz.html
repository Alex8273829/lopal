  var video = document.getElementById("meuVideo");

  botao.onclick = function() {
    indiceAtual++;
    if (indiceAtual >= listaVideos.length) {
      indiceAtual = 0;
    }
    video.src = listaVideos[indiceAtual];
    video.play();
    nomeVideo.innerText = "Agora tocando: " + listaVideos[indiceAtual];
  };

  
  btnPlayPause.onclick = function() {
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  };
</script>
